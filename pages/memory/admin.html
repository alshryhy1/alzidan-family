<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة من الذاكرة | عائلة الزيدان</title>
  <link rel="stylesheet" href="../../assets/css/main.css?v=1782540604">
  <link rel="stylesheet" href="../../assets/css/memory-submit.css?v=2026071223">
  <style>
    .memory-admin-wrap { max-width: 960px; margin: 0 auto; padding: 20px 14px; }
    .memory-admin-card { background: linear-gradient(135deg, #ecfdf5, #f0fdf4); border: 1px solid #bbf7d0; border-radius: 16px; padding: 18px; margin-bottom: 14px; }
    .memory-admin-card h2 { margin: 0 0 12px; font-size: 20px; color: #064e3b; }
    .memory-item-row { border: 1px solid #bbf7d0; background: #fff; border-radius: 10px; padding: 10px; margin-bottom: 8px; }
    .memory-item-row h4 { margin: 0 0 4px; font-size: 15px; color: #064e3b; }
    .memory-item-row p { margin: 0; font-size: 12px; color: #475569; }
    .memory-item-actions { margin-top: 8px; display: flex; gap: 6px; }
    .memory-item-actions button { border: 1px solid #6ee7b7; background: #ecfdf5; color: #065f46; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
    #memory-status { margin-top: 12px; font-weight: 700; min-height: 22px; color: #065f46; }
    #memory-status.is-error { color: #991b1b; }
    #memory-delete { margin-top: 10px; border-color: #fecaca !important; color: #991b1b !important; background: #fff !important; }
  </style>
</head>
<body>
  <main class="memory-admin-wrap">
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
      <a class="btn btn-outline btn-small" href="../admin.html">لوحة الإدارة</a>
      <a class="btn btn-outline btn-small" href="./">من الذاكرة (عام)</a>
    </div>

    <h1 style="margin:0 0 6px; color:#064e3b;">إدارة من الذاكرة</h1>
    <p class="hint" style="margin:0 0 6px;">نفس نموذج المندوب — الفرق: التوقيع «تم الإرسال من الإدارة» ويُحفظ معتمداً.</p>
    <div id="memory-auth-hint" class="hint" style="color:#92400e; margin-bottom:14px;"></div>

    <div id="memory-submit-root"></div>

    <div style="margin-top:10px;">
      <button id="memory-delete" class="btn btn-outline" type="button">حذف المادة المحددة</button>
      <div id="memory-status"></div>
    </div>

    <article class="memory-admin-card" style="margin-top:18px;">
      <h2>مواد هذا الشخص</h2>
      <p class="hint" style="margin:0 0 8px;">تُحمَّل من القاعدة بعد اختيار الاسم من الشجرة.</p>
      <div id="memory-items-list"></div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="../../assets/js/config.js"></script>
  <script src="../../assets/js/memory/source-label.js?v=2026071220"></script>
  <script src="../../assets/js/memory/submit.js?v=2026071223"></script>
  <script src="../../assets/js/memory/admin.js?v=2026071223"></script>
</body>
</html>
